name: Update Skin Database

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape wiki & generate web_skins.json
        run: python data/prepare_web_data.py

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/web_skins.json
          if git diff --staged --quiet; then
            echo "No changes — skin database is already up to date."
          else
            git commit -m "chore: update skin database $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
